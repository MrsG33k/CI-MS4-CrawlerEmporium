{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container my-5 font-mono">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 bg-black border border-secondary p-4 text-white rounded-2 shadow">
            <h2 class="text-uppercase text-warning mb-4">> AI ADMIN:EDIT LOOTBOX: {{ product.name }}</h2>
            <hr class="border-secondary mb-4">
            
            <form method="POST" action="{% url 'edit_product' product.id %}" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label text-warning small d-block mb-1">> Update_{{ field.label }}:</label>
                        {{ field }}
                        {% if field.help_text %}
                            <div class="form-text text-muted small mt-1">{{ field.help_text }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <div class="mt-4 pt-2">
                    <button type="submit" class="btn btn-outline-warning text-uppercase px-4">Commit Changes</button>
                    <a href="{% url 'products' %}" class="btn btn-outline-secondary text-uppercase ms-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
