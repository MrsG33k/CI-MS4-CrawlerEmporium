{% extends "base.html" %}
{% load static %}

{% block page_header %}
    <div class="container header-container">
        <div class="row">
            <div class="col"></div>
        </div>
    </div>
{% endblock %}

{% block content %}
    <div class="container-fluid">
        <div class="row">
            <div class="col text-center mt-4 mb-3">
                <h2 class="logo-font text-uppercase text-light tracking-wider m-0">VAULT INVENTORY</h2>
                <hr class="border-warning border-2 opacity-75 mx-auto" style="width: 100px;">
            </div>
        </div>
            <div class="row">
                <div class="product-container col-10 offset-1">
                    <div class="row mt-1 mb-2"></div>
                    <div class="row">
                        {% for product in products %}
                            <div class="col-12 col-sm-6 col-md-6 col-lg-4 col-xl-3 mb-4 d-flex align-items-stretch">
                                
                                <div class="card w-100 bg-black bg-opacity-50 border border-secondary border-opacity-50 rounded-0 shadow-lg custom-dungeon-card">
                                    {% if product.image %}
                                    <a href="">
                                        <img class="card-img-top img-fluid rounded-0 border-bottom border-secondary border-opacity-25" src="{{ product.image.url }}" alt="{{ product.name }}">
                                    </a>
                                    {% else %}  
                                    <a href="">
                                        <img class="card-img-top img-fluid rounded-0 border-bottom border-secondary border-opacity-25" src="{{ MEDIA_URL }}noimage.png" alt="{{ product.name }}">
                                    </a>
                                    {% endif %}

                                    <div class="card-body pb-2 bg-dark bg-opacity-20 text-light">
                                        <p class="mb-0 font-nav text-uppercase tracking-wider fw-bold text-secondary-hover" style="font-size: 0.95rem;">
                                            {{ product.name }}
                                        </p>
                                    </div>

                                    <div class="card-footer bg-dark bg-opacity-20 pt-0 pb-3 border-0 text-start">
                                        <div class="row">
                                            <div class="col">
                                                <p class="lead mb-0 text-start font-weight-bold text-warning logo-font" style="font-size: 1.2rem; letter-spacing: 0.5px;">
                                                    £{{ product.price|floatformat:2 }}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div> {% endfor %}
                    </div>
                </div>
            </div>
    </div>
{% endblock %}
