{% extends "base.html" %}
{% load i18n %}

{% block head_title %}{% trans "Set Password" %}{% endblock %}

{% block content %}
<div class="container my-5 py-4 backpack-page-wrapper">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            
            <div class="bg-black border border-secondary rounded-2 p-4 font-sub shadow-lg">
                
                <div class="text-center mb-4">
                    <h2 class="logo-font text-white text-uppercase tracking-wider mb-1 fs-4">
                        Set <span class="text-warning">Password</span>
                    </h2>
                    <p class="text-white small font-inter text-transform-none mb-0">
                        Establish secure local access credentials for your crawler account.
                    </p>
                    <div class="border-bottom border-secondary opacity-25 mt-3"></div>
                </div>

                <form method="POST" action="{% url 'account_set_password' %}" class="password_set gap-3 d-flex flex-column font-inter text-transform-none text-light">
                    {% csrf_token %}
                    
                    <div class="mb-3 font-sub custom-allauth-inputs">
                        {{ form.as_p }}
                    </div>
                    
                    <div class="mt-2">
                        <button type="submit" name="action" class="btn glow-btn w-100 py-2.5 text-uppercase tracking-wide font-sub">
                            {% trans 'Set Password' %}
                        </button>
                    </div>
                </form>
                
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
