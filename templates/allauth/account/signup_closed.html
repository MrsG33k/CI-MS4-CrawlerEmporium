{% extends "base.html" %}
{% load i18n %}

{% block head_title %}{% trans "Sign Up Closed" %}{% endblock %}

{% block content %}
<div class="container my-5 py-4 backpack-page-wrapper">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5 text-center">
            
            <div class="bg-black border border-secondary rounded-2 p-4 font-sub shadow-lg text-light">
                
                <h2 class="logo-font text-white text-uppercase tracking-wider mb-3 fs-4">
                    Sign Up <span class="text-danger">Closed</span>
                </h2>
                <hr class="border-secondary border-opacity-25 mb-4">
                
                <p class="font-inter text-transform-none text-white mb-4">
                    {% trans "We are sorry, but account registration is currently closed." %}
                </p>
                
                <a href="{% url 'home' %}" class="btn btn-outline-secondary font-nav text-uppercase tracking-wider rounded-0 btn-sm px-3 py-2 w-100">
                    <i class="fas fa-arrow-left me-2"></i>Return to Main Vault
                </a>
                
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
