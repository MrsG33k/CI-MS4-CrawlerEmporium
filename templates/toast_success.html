<div class="toast ai-toast-container position-fixed top-0 end-0 m-3 rounded-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="5000">
    <div class="toast-header ai-toast-header d-flex justify-content-between align-items-center p-2">
        <strong class="toast-achievement-title text-uppercase fs-6">
            <i class="fas fa-trophy me-2"></i>New Achievement!
        </strong>
        <button type="button" class="btn-close toast-close-btn" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body text-light font-sub py-3 px-3 border-top-0">
        <p class="mb-2 text-white fw-bold tracking-wider fs-6">
            {{ message }}
        </p>
        <p class="m-0 text-light small fst-italic">
            Thank you for shopping with Crawler Emporium. <br> Remember to Kill! Kill! Kill!
        </p>
    </div>
</div>
