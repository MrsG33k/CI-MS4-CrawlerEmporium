<div class="toast ai-toast-container position-fixed top-0 end-0 m-3 rounded-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="6500">
    <div class="toast-header ai-toast-header d-flex justify-content-between align-items-center p-2">
        <strong class="toast-achievement-title text-uppercase fs-6">
            <i class="fas fa-trophy me-2"></i>New Achievement!
        </strong>
        <button type="button" class="btn-close toast-close-btn" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body text-light py-3 px-3 border-top-0">
        <p class="mb-3 text-white tracking-wide lh-base ai-toast-message">
            {{ message }}
        </p>
        <p class="m-0 text-secondary small fst-italic font-sub ai-toast-subtext">
            Thank you for shopping with Crawler Emporium. <br> and Remember....Kill! Kill! Kill!
        </p>
    </div>
</div>
